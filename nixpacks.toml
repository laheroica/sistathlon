[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "nodejs_20", "nodePackages.npm"]

[phases.build]
cmds = [
  "cd frontend && npm install && npm run build",
  "cd backend && pip install -r requirements.txt",
  "cd backend && python manage.py collectstatic --noinput",
  "cd backend && python manage.py migrate --noinput"
]

[start]
cmd = "cd backend && gunicorn sistathlon.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
